name: Pilot 02 endpoint lock

on:
  push:
  pull_request:

jobs:
  verify-pilot02-v0-2-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify integrity and semantic invariants
        run: python3 tools/verify_pilot02_lock.py
      - name: Run mutation rejection tests
        run: python3 -m unittest tests/test_pilot02_lock.py -v
